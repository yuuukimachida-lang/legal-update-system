# =============================================================================
# Legal Update System - Importance Rules
# =============================================================================
# 各取得アイテムを「重要 / 中 / 参考」の3段階に分類するための判定ルール。
# ハイブリッド方式: 客観軸はルールベースでスコアリング、主観軸はLLMが本文から
# 抽出する。両者の合計スコアにソースの priority_weight を乗じて最終判定する。
#
# 運用イメージ (週単位):
#   重要: 0〜3件   中: 3〜6件   参考: 任意
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 客観軸 (取得記事のメタ情報から抽出可能)
# -----------------------------------------------------------------------------
objective_axes:

  legal_form:
    description: 法形式・法的階層
    extraction: メタ情報・タイトル・冒頭文から自動抽出
    scores:
      法律改正: 5
      政令改正: 5
      内閣府令改正: 4
      省令改正: 4
      告示: 3
      通達: 3
      ガイドライン改訂_全面: 4
      ガイドライン改訂_部分: 3
      QA・解釈指針: 2
      パブコメ実施中: 4
      パブコメ結果公表: 3
      最高裁判決: 4
      下級審重要判決: 2
      自主規制規則改正_東証: 3
      自主規制規則改正_その他: 2
      行政処分・課徴金事例: 2
      法制審・有識者会議答申: 3

  enforcement_timing:
    description: 施行までの期間 (またはパブコメ意見締切までの期間)
    scores:
      未施行_6ヶ月以内: 5
      未施行_12ヶ月以内: 4
      未施行_24ヶ月以内: 3
      未施行_24ヶ月超: 2
      施行直前_3ヶ月以内: 5
      施行済み: 2
      時期未定: 2
    bonus:
      パブコメ意見締切_30日以内: +2
      パブコメ意見締切_90日以内: +1

  obligation_level:
    description: 法的拘束力
    extraction: 本文・条文から抽出 (LLM補助)
    scores:
      義務化: 5
      努力義務: 3
      推奨・ベストプラクティス: 2
      参考情報: 1

# -----------------------------------------------------------------------------
# 2. 主観軸 (LLMが本文から判定)
# -----------------------------------------------------------------------------
subjective_axes:

  client_scope:
    description: 影響を受けるクライアントの広さ。業種限定のアップデートでも、その業種のクライアントにとっての重要さで判定する (一律基準)。
    scores:
      全上場企業: 5
      特定セクター_全般: 4
      特定セクター_該当クライアントには高影響: 4
      特定規模・要件該当企業: 3
      限定的: 2

  practical_impact:
    description: 顧問先が取るべき実務対応の重さ
    scores:
      内部規程・契約書ひな形の改訂が必要: 5
      開示書類・報告書の記載変更が必要: 4
      社内手続・ITシステムの変更が必要: 3
      契約書レビュー・取引慣行の見直し: 3
      情報共有・社内周知レベル: 2
      参考情報のみ: 1

# -----------------------------------------------------------------------------
# 3. ソース重み (sources.yaml の priority_weight を乗算)
# -----------------------------------------------------------------------------
source_weight:
  apply: true
  formula: |
    final_score = (sum_of_axis_scores) * source.priority_weight

  # 二次ソース (priority_weight: 0.0) は単独でアイテム化されない
  # → 一次ソースのアイテムに対する「実務影響の参考資料」としてのみ使用

# -----------------------------------------------------------------------------
# 4. 判定閾値
# -----------------------------------------------------------------------------
thresholds:
  high: 17    # 「重要」: final_score >= 17  / 週0〜3件目安
  mid: 11     # 「中」  : 11 <= final_score < 17
  low: 0      # 「参考」: final_score < 11

  # 閾値はパイロット運用後に再調整する。最初の4週間は判定結果と人手判定の
  # 乖離を記録し、その結果を踏まえて補正する想定。

# -----------------------------------------------------------------------------
# 5. 続報 (follow-up) の扱い
# -----------------------------------------------------------------------------
follow_up:
  detection:
    method: LLM
    criteria:
      - 過去配信済みアイテムと同一の改正案件・トピックを扱っている
      - 同一改正の進捗段階 (法制審答申 → パブコメ → 結果公表 → 施行直前 → 施行)
      - 既存ガイドライン・QAへの追補・FAQ更新
      - 既存判決・裁判例の上級審判断
    matching:
      - past_items_lookback_weeks: 26   # 過去6ヶ月分の配信済アイテムと照合
      - require_high_confidence: true   # 確度が低い場合は新規アイテム扱い

  display_policy:
    section: dedicated_followup_section   # サマリー本体ではなく「続報」専用セクション
    placement: サマリーの末尾、詳細レポートの直前
    badge_label: 続報
    badge_style: muted                    # 控えめなスタイル (グレー系)
    show_parent_link: true                # 元アイテムへの参照リンク
    show_progress_indicator: true         # 「パブコメ → 結果公表」等の進捗を可視化

  importance_rule:
    inherit_parent_importance: false      # 元の重要度は引き継がない
    treatment: always_followup            # 重要度判定の対象外。常に「続報」として処理

# -----------------------------------------------------------------------------
# 6. LLM出力スキーマ (各アイテムの判定結果)
# -----------------------------------------------------------------------------
output_schema:
  importance: high | mid | low | followup
  final_score: number              # 0〜30程度の範囲
  axis_breakdown:                  # 透明性のため各軸の評点を保持
    legal_form: { value: string, score: number }
    enforcement_timing: { value: string, score: number }
    obligation_level: { value: string, score: number }
    client_scope: { value: string, score: number }
    practical_impact: { value: string, score: number }
  source_weight_applied: number    # 適用された priority_weight
  judgment_reason: string          # 判定理由 (1〜3文、UI表示用)
  is_follow_up: boolean
  parent_update_id: string | null  # 続報の場合の元アイテム識別子

# -----------------------------------------------------------------------------
# 7. UI表示要件
# -----------------------------------------------------------------------------
ui_display:
  importance_badge:
    high: "重要（AI仮判定）"
    mid:  "中（AI仮判定）"
    low:  "参考（AI仮判定）"
    followup: "続報"

  judgment_reason_display:
    location: 詳細レポート内 (重要度バッジの直下に小さく表示)
    format: |
      AI仮判定の理由: {judgment_reason}
    style: text-xs / 薄いグレー / 折りたたみ可能
    purpose: 今後の判定精度アップデート時の参考資料として活用

  followup_section:
    title: "過去アップデートの続報"
    layout: コンパクトなリスト形式 (1行/件)
    fields:
      - 続報バッジ
      - 元アイテムへのリンク
      - "進捗ステータス (例: パブコメ → 結果公表)"
      - 1行サマリー
