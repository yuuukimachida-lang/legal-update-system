# =============================================================================
# Legal Update System - Sources Configuration
# =============================================================================
# 週次法令アップデート配信のソース定義ファイル。
# 取得スクリプト・AI要約・UIフィルタの全てがこの定義を参照する。
#
# スキーマ:
#   id              : 一意識別子 (snake_case)
#   name            : 表示名
#   category        : 法令カテゴリ (会社法 / 金融商品取引法 / REIT関連 / 労働法 / ジェネラルコーポレート)
#                     ※ 一つのソースから複数カテゴリの記事が出る場合は配列で複数指定
#   practice_area   : 該当プラクティス (コーポレート / CM / REIT / PE / M&A / 労働 / GC)
#   source_type     : primary (公的機関) / secondary (事務所NL) / journal (商業誌)
#   fetch_method    : rss / api / scrape / email_subscription / manual
#   url             : メインURL (人間が確認する用)
#   feed_url        : 機械可読フィード (RSS/API) のエンドポイント
#   list_page_url   : スクレイプ時の新着一覧ページ
#   priority_weight : 重要度判定の重み係数 (デフォルト 1.0、二次ソースは 0.0=本文には使うがアイテム化しない)
#   active          : 取得有効フラグ
#   notes           : 運用メモ
#
# 注意:
#   - URL は初期ドラフトのため、実装前に各サイトで現行URLを再確認すること。
#   - 二次ソース(secondary) は「リンク提示」と「AI要約の参考資料」として使用するが、
#     一次ソース不在の場合に単独でアイテム化することはしない (priority_weight: 0.0)。
#   - 過去アイテムへの続報判定は、source_type を問わず全ソースで実施する。
# =============================================================================

sources:

